name: Site regression

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: site-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify data contracts
        run: |
          scripts/verify_site_contract.sh docs/site/data/icml2026_index.json
          python3 scripts/verify_embedding_map.py docs/site/data/icml2026_index.json docs/site/data/icml2026_map.json
          python3 scripts/test_embedding_map_units.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.58.2
          npx playwright install --with-deps chromium

      - name: Run UI smoke test
        run: |
          python3 -m http.server 57995 --directory docs > /tmp/icml-site.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:57995/ >/dev/null; then
              break
            fi
            sleep 1
          done
          node scripts/verify_ui_smoke.mjs http://127.0.0.1:57995/
