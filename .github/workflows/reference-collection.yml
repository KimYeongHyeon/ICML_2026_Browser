name: Collect references

on:
  workflow_dispatch:
  schedule:
    - cron: "41 19 * * *"

permissions:
  contents: write

concurrency:
  group: reference-collection
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        offset: [0, 50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550, 600, 650, 700, 750, 800, 850, 900, 950, 1000, 1050, 1100, 1150, 1200, 1250, 1300, 1350, 1400, 1450, 1500, 1550, 1600, 1650, 1700, 1750, 1800, 1850, 1900, 1950, 2000, 2050, 2100, 2150, 2200, 2250, 2300, 2350, 2400, 2450, 2500, 2550, 2600, 2650, 2700, 2750, 2800, 2850, 2900, 2950, 3000, 3050, 3100, 3150, 3200, 3250, 3300, 3350, 3400, 3450, 3500, 3550, 3600, 3650, 3700, 3750, 3800, 3850, 3900, 3950, 4000, 4050, 4100, 4150, 4200, 4250, 4300, 4350, 4400, 4450, 4500, 4550, 4600, 4650, 4700, 4750, 4800, 4850, 4900, 4950, 5000, 5050, 5100, 5150, 5200, 5250, 5300, 5350, 5400, 5450, 5500, 5550, 5600, 5650, 5700, 5750, 5800, 5850, 5900, 5950, 6000, 6050, 6100, 6150, 6200, 6250, 6300, 6350, 6400, 6450, 6500, 6550, 6600, 6650, 6700, 6750, 6800, 6850, 6900, 6950, 7000, 7050]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
      - name: Collect reference chunk
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: |
          collect_chunk() {
            rm -rf "/tmp/icml_ref_chunks/chunk-${{ matrix.offset }}"
            python3 scripts/build_icml_references.py \
              --source openalex \
              --fallbacks crossref \
              --pdf-fallback \
              --record-types paper,workshop \
              --offset "${{ matrix.offset }}" \
              --limit 50 \
              --sleep 1.0 \
              --timeout 30 \
              --cache-path "/tmp/icml_refs_cache_${{ matrix.offset }}.json" \
              --out-root "/tmp/icml_ref_chunks/chunk-${{ matrix.offset }}"
            python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("/tmp/icml_ref_chunks/chunk-${{ matrix.offset }}/manifest.json").read_text())
          summary = manifest["summary"]
          record_count = int(summary.get("recordCount") or 0)
          errors = int(summary.get("errors") or 0)
          reference_strings = int(summary.get("referenceStrings") or 0)
          if errors >= 25 and record_count < 10 and reference_strings < 100:
            raise SystemExit(f"Reference chunk quality gate failed: {summary}")
          PY
          }
          collect_chunk || { echo "Chunk quality failed once; retrying after cooldown."; sleep 180; collect_chunk; }
      - uses: actions/upload-artifact@v4
        with:
          name: refs-${{ matrix.offset }}
          path: /tmp/icml_ref_chunks/chunk-${{ matrix.offset }}
          retention-days: 2

  merge:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/icml_ref_chunks
          pattern: refs-*
          merge-multiple: false
      - name: Merge reference chunks
        run: |
          python3 scripts/build_icml_references.py \
            --merge-chunks /tmp/icml_ref_chunks \
            --out-root docs/site/data/references \
            --publish
          python3 scripts/build_icml_references.py --validate docs/site/data/references/manifest.json
      - name: Commit references
        id: commit-references
        run: |
          git add docs/site/data/references
          if git diff --cached --quiet; then
            echo "No reference changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update reference collection"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Deploy GitHub Pages
        if: steps.commit-references.outputs.changed == 'true'
        run: |
          tmp_dir="$(mktemp -d)"
          trap 'git worktree remove --force "$tmp_dir" 2>/dev/null || rm -rf "$tmp_dir"' EXIT
          git fetch origin gh-pages
          git worktree add -B gh-pages "$tmp_dir" origin/gh-pages
          rsync -a --delete docs/site/ "$tmp_dir"/
          git -C "$tmp_dir" add -A
          if git -C "$tmp_dir" diff --cached --quiet; then
            echo "No GitHub Pages changes."
            exit 0
          fi
          git -C "$tmp_dir" config user.name "github-actions[bot]"
          git -C "$tmp_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tmp_dir" commit -m "Deploy reference collection"
          git -C "$tmp_dir" push origin gh-pages
